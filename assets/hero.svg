<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="360" viewBox="0 0 1280 360" fill="none" role="img" aria-label="Sorin Mihailescu — Founder and Engineer">
  <defs>
    <!-- Moving Artyphonic-orange gradient for the title -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5a1f">
        <animate attributeName="stop-color" values="#ff5a1f;#ff8a2a;#ffc24b;#ff5a1f" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="0.5" stop-color="#ff8a2a">
        <animate attributeName="stop-color" values="#ff8a2a;#ffc24b;#ff5a1f;#ff8a2a" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="1" stop-color="#ffc24b">
        <animate attributeName="stop-color" values="#ffc24b;#ff5a1f;#ff8a2a;#ffc24b" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Warm glow blobs -->
    <radialGradient id="blobA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff6a1a" stop-opacity="0.55" />
      <stop offset="1" stop-color="#ff6a1a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blobB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb020" stop-opacity="0.5" />
      <stop offset="1" stop-color="#ffb020" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blobC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff3d00" stop-opacity="0.45" />
      <stop offset="1" stop-color="#ff3d00" stop-opacity="0" />
    </radialGradient>

    <!-- Shimmer sweep gradient -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff3e6" stop-opacity="0" />
      <stop offset="0.5" stop-color="#fff3e6" stop-opacity="0.85" />
      <stop offset="1" stop-color="#fff3e6" stop-opacity="0" />
    </linearGradient>

    <!-- Reveal mask for shimmer confined to the title -->
    <mask id="titleMask">
      <text x="80" y="176" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="82" font-weight="800" fill="#ffffff">Sorin Mihailescu</text>
    </mask>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="42" />
    </filter>
  </defs>

  <!-- Warm backdrop -->
  <rect width="1280" height="360" rx="20" fill="#0d0a08" />

  <!-- Animated glow blobs -->
  <g filter="url(#soft)">
    <circle r="150" fill="url(#blobA)">
      <animateTransform attributeName="transform" type="translate" values="220,120; 340,180; 220,120" dur="11s" repeatCount="indefinite" />
    </circle>
    <circle r="140" fill="url(#blobB)">
      <animateTransform attributeName="transform" type="translate" values="1040,240; 940,150; 1040,240" dur="13s" repeatCount="indefinite" />
    </circle>
    <circle r="120" fill="url(#blobC)">
      <animateTransform attributeName="transform" type="translate" values="700,60; 620,150; 700,60" dur="9s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Subtle warm grid -->
  <g stroke="#241a12" stroke-width="1" opacity="0.7">
    <line x1="0" y1="90" x2="1280" y2="90" />
    <line x1="0" y1="180" x2="1280" y2="180" />
    <line x1="0" y1="270" x2="1280" y2="270" />
  </g>
  <rect width="1280" height="360" rx="20" fill="none" stroke="#3a2716" stroke-width="1.5" />

  <!-- Eyebrow -->
  <text x="82" y="86" font-family="'Fira Code', 'SFMono-Regular', Consolas, monospace" font-size="18" letter-spacing="6" fill="#ff8a2a">FOUNDER &#183; ENGINEER</text>

  <!-- Title -->
  <text x="80" y="176" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="82" font-weight="800" fill="url(#brand)">Sorin Mihailescu</text>

  <!-- Shimmer sweep across the title -->
  <g mask="url(#titleMask)">
    <rect x="-500" y="80" width="360" height="120" fill="url(#sheen)" transform="skewX(-18)">
      <animate attributeName="x" values="-500;1300" dur="5s" begin="1s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Subtitle -->
  <text x="82" y="222" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#e6ddd0">Ships companies, not just code.</text>

  <!-- Product chips -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
    <g transform="translate(82,258)">
      <rect width="132" height="34" rx="17" fill="#1a1109" stroke="#ff6a1a" stroke-width="1.4" />
      <circle cx="20" cy="17" r="4.5" fill="#ffb020" />
      <text x="34" y="23" fill="#f5ece0">Artyphonic</text>
    </g>
    <g transform="translate(228,258)">
      <rect width="126" height="34" rx="17" fill="#1a1109" stroke="#ffb020" stroke-width="1.4" />
      <circle cx="20" cy="17" r="4.5" fill="#ff6a1a" />
      <text x="34" y="23" fill="#f5ece0">Traveleon</text>
    </g>
  </g>

  <!-- Terminal line with blinking cursor -->
  <g font-family="'Fira Code', 'SFMono-Regular', Consolas, monospace" font-size="20">
    <text x="82" y="320" fill="#b08a5a">$ <tspan fill="#e6ddd0">building the future, one commit at a time</tspan></text>
    <rect x="516" y="304" width="11" height="22" fill="#ff8a2a">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
