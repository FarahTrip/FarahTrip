<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="360" viewBox="0 0 1280 360" fill="none" role="img" aria-label="Sorin Mihailescu — Founder and Engineer">
  <defs>
    <!-- Moving brand gradient for the title -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6a11cb">
        <animate attributeName="stop-color" values="#6a11cb;#2575fc;#00c9a7;#6a11cb" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="0.5" stop-color="#2575fc">
        <animate attributeName="stop-color" values="#2575fc;#00c9a7;#6a11cb;#2575fc" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="1" stop-color="#00c9a7">
        <animate attributeName="stop-color" values="#00c9a7;#6a11cb;#2575fc;#00c9a7" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Glow blobs -->
    <radialGradient id="blobA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2575fc" stop-opacity="0.55" />
      <stop offset="1" stop-color="#2575fc" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blobB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00c9a7" stop-opacity="0.5" />
      <stop offset="1" stop-color="#00c9a7" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blobC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6a11cb" stop-opacity="0.5" />
      <stop offset="1" stop-color="#6a11cb" stop-opacity="0" />
    </radialGradient>

    <!-- Shimmer sweep gradient -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <!-- Reveal mask for shimmer confined to the title -->
    <mask id="titleMask">
      <text x="80" y="176" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="82" font-weight="800" fill="#ffffff">Sorin Mihailescu</text>
    </mask>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="42" />
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="1280" height="360" rx="20" fill="#0d1117" />

  <!-- Animated glow blobs -->
  <g filter="url(#soft)">
    <circle r="150" fill="url(#blobA)">
      <animateTransform attributeName="transform" type="translate" values="220,120; 340,180; 220,120" dur="11s" repeatCount="indefinite" />
    </circle>
    <circle r="140" fill="url(#blobB)">
      <animateTransform attributeName="transform" type="translate" values="1040,240; 940,150; 1040,240" dur="13s" repeatCount="indefinite" />
    </circle>
    <circle r="120" fill="url(#blobC)">
      <animateTransform attributeName="transform" type="translate" values="700,60; 620,150; 700,60" dur="9s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Subtle grid -->
  <g stroke="#1b2230" stroke-width="1" opacity="0.6">
    <line x1="0" y1="90" x2="1280" y2="90" />
    <line x1="0" y1="180" x2="1280" y2="180" />
    <line x1="0" y1="270" x2="1280" y2="270" />
  </g>
  <rect width="1280" height="360" rx="20" fill="none" stroke="#222c3c" stroke-width="1.5" />

  <!-- Eyebrow -->
  <text x="82" y="86" font-family="'Fira Code', 'SFMono-Regular', Consolas, monospace" font-size="18" letter-spacing="6" fill="#00c9a7">FOUNDER &#183; ENGINEER</text>

  <!-- Title -->
  <text x="80" y="176" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="82" font-weight="800" fill="url(#brand)">Sorin Mihailescu</text>

  <!-- Shimmer sweep across the title -->
  <g mask="url(#titleMask)">
    <rect x="-500" y="80" width="360" height="120" fill="url(#sheen)" transform="skewX(-18)">
      <animate attributeName="x" values="-500;1300" dur="5s" begin="1s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Subtitle -->
  <text x="82" y="222" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#c9d4e3">Ships companies, not just code.</text>

  <!-- Product chips -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
    <g transform="translate(82,258)">
      <rect width="132" height="34" rx="17" fill="#0f1830" stroke="#2575fc" stroke-width="1.3" />
      <circle cx="20" cy="17" r="4.5" fill="#00c9a7" />
      <text x="34" y="23" fill="#e6edf5">Artyphonic</text>
    </g>
    <g transform="translate(228,258)">
      <rect width="126" height="34" rx="17" fill="#0f1830" stroke="#00c9a7" stroke-width="1.3" />
      <circle cx="20" cy="17" r="4.5" fill="#2575fc" />
      <text x="34" y="23" fill="#e6edf5">Traveleon</text>
    </g>
  </g>

  <!-- Terminal line with blinking cursor -->
  <g font-family="'Fira Code', 'SFMono-Regular', Consolas, monospace" font-size="20">
    <text x="82" y="320" fill="#7d8aa0">$ <tspan fill="#c9d4e3">building the future, one commit at a time</tspan></text>
    <rect x="516" y="304" width="11" height="22" fill="#00c9a7">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
