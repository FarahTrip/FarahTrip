name: Generate contribution snake

on:
  # Run every 12 hours to keep the snake fresh
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate whenever the default branch is pushed
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#ff6a1a&color_dots=#1a1109,#5a3410,#a3560f,#ff8a2a,#ffc24b
            dist/github-snake-dark.svg?color_snake=#ff6a1a&color_dots=#1a1109,#5a3410,#a3560f,#ff8a2a,#ffc24b
            dist/ocean.gif?color_snake=#ff6a1a&color_dots=#1a1109,#5a3410,#a3560f,#ff8a2a,#ffc24b

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
